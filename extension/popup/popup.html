<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HuntMode</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <h1>HuntMode</h1>
      <p id="auth-status" class="muted">Checking connection…</p>
    </header>

    <div class="actions">
      <button id="save-tab" type="button">Save this tab</button>
      <button id="add-now" type="button" class="primary">Add to hunt now</button>
    </div>

    <div class="row">
      <button id="connect" type="button" class="link">Connect account</button>
      <button id="open-app" type="button" class="link">Open HuntMode</button>
    </div>

    <section>
      <h2>Queued roles <span id="queue-count"></span></h2>
      <ul id="queue-list"></ul>
      <p id="empty-queue" class="muted">No saved URLs yet. Right-click a job posting or use Save this tab.</p>
    </section>

    <p id="status" class="status" hidden></p>
    <script type="module" src="popup.js"></script>
  </body>
</html>
